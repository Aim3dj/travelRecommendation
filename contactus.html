<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TravelSmart | Contact Us</title>

    <link rel="stylesheet" href="travel_recommendation.css">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

</head>
<body>

    <!-- Navbar -->
    <header>
        <div class="logo">
            <a href="/travel_recommendation.html">
                <i class="fa-solid fa-earth-americas"></i>
                <h2>TravelSmart</h2>
            </a>
        </div>

        <nav>
            <a href="/travel_recommendation.html">Home</a>
            <a href="/aboutus.html">About Us</a>
            <a href="/contactus.html">Contact Us</a>
        </nav>

        <div class="search-container">
            <input type="text" id="searchInput" placeholder="Enter a destination or keyword">
            <button id="search-btn-icon" onclick="searchDestination()">
                <i id="search-icon" class="fa fa-search" aria-hidden="true"></i>
            </button>
            <button onclick="searchDestination()">Search</button>
            <button onclick="clearSearch()">Clear</button>
        </div>
    </header>
    
    <section class="hero">
        <!-- Social Media -->
        <div class="social-icons">
            <a href="#"><i class="fab fa-twitter"></i></a>
            <a href="#"><i class="fab fa-facebook-f"></i></a>
            <a href="#"><i class="fab fa-instagram"></i></a>
            <a href="#"><i class="fab fa-youtube"></i></a>
        </div>

        <!-- Contact Section -->
        <section class="contact-container">

            <div class="contact-info">
                <h1>CONTACT US</h1>
                <p>Get in touch</p>
            </div>

            <div class="contact-form">

                <form>

                    <div class="form-group">
                        <label>Name</label>
                        <input type="text"
                            placeholder="Enter your name"
                            required>
                    </div>

                    <div class="form-group">
                        <label>Email</label>
                        <input type="email"
                            placeholder="Enter your email"
                            required>
                    </div>

                    <div class="form-group">
                        <label>Message</label>
                        <textarea placeholder="Enter your message"
                                required></textarea>
                    </div>

                    <button type="submit">Submit</button>

                </form>

            </div>

        </section>
    </section>
</body>
</html>
