<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TravelSmart - Contact Us</title>

    <link rel="stylesheet" href="travel_recommendation.css">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

</head>
<body>

    <!-- Navbar -->
    <header>
        <div class="logo">
            <a href="/travel_recommendation.html">
                <img src="images/travel-smart-logo.jpg" alt="">
                <h2>TravelSmart</h2>
            </a>
        </div>

        <nav>
            <a href="/travel_recommendation.html">Home</a>
            <a href="/aboutus.html">About Us</a>
            <a href="/contactus.html">Contact Us</a>
        </nav>
    </header>

    <section class="hero">
        <!-- Social Media -->
        <div class="social-icons">
            <a href="https://x.com/?lang=en"><i class="fab fa-twitter"></i></a>
            <a href="https://www.facebook.com/login/?next=https%3A%2F%2Fwww.facebook.com%2F%3Flocale%3Den_CA"><i class="fab fa-facebook-f"></i></a>
            <a href="https://www.instagram.com/"><i class="fab fa-instagram"></i></a>
            <a href="https://www.youtube.com/"><i class="fab fa-youtube"></i></a>
        </div>

        <!-- Contact Section -->
        <section class="contact-container">

            <div class="contact-info">
                <h1>CONTACT US</h1>
                <p>Get in touch</p>
            </div>

            <div class="contact-form">

                <form>

                    <div class="form-group">
                        <label>Name</label>
                        <input type="text"
                            placeholder="Enter your name"
                            required>
                    </div>

                    <div class="form-group">
                        <label>Email</label>
                        <input type="email"
                            placeholder="Enter your email"
                            required>
                    </div>

                    <div class="form-group">
                        <label>Message</label>
                        <textarea placeholder="Enter your message"
                                required></textarea>
                    </div>

                    <button type="submit" onclick="thankyou()">Submit</button>

                </form>

            </div>

        </section>
    </section>
    <script>
        function thankyou(){
            alert('Thank you for contacting us!')
        }
    </script>
</body>
</html>
